<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <main>
        <div class="calculator">
            <input type="text" class="calculator__input--text" placeholder="00.00">
            <button class="calculator__button" type="button" value="0" name="0">0</button>
            <button class="calculator__button" type="button" value="1" name="1">1</button>
            <button class="calculator__button" type="button" value="2" name="2">2</button>
            <button class="calculator__button" type="button" value="+" name="+">+</button>
            <button class="calculator__button" type="button" value="3" name="3">3</button>
            <button class="calculator__button" type="button" value="4" name="4">4</button>
            <button class="calculator__button" type="button" value="5" name="5">5</button>
            <button class="calculator__button" type="button" value="-" name="-">-</button>
            <button class="calculator__button" type="button" value="6" name="6">6</button>
            <button class="calculator__button" type="button" value="7" name="7">7</button>
            <button class="calculator__button" type="button" value="8" name="8">8</button>
            <button class="calculator__button" type="button" value="*" name="*">*</button>
            <button class="calculator__button" type="button" value="9" name="9">9</button>
            <button class="calculator__button" type="button" value="/" name="/">/</button>
            <button class="calculator__button" type="button" value="=" name="=">=</button>
            <button class="calculator__button" type="button" value="clear" name="clear">C</button>
        </div>
    </main>
</body>
</html>
